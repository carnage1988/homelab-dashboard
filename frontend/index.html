<!DOCTYPE html>
<html>
<head>
  <title>Homelab Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Homelab Dashboard</h1>

  <button onclick="loadSystem()">Refresh</button>

<div id="dashboard-grid">

    <div id="host-card">
        <div class="host-header">
            <h2 id="hostname">Loading...</h2>
            <span id="status-light" class="status-light"></span>
            <span id="status-text">Checking...</span>
        </div>

        <p>Status: <span id="status">Unknown</span></p>
        <p>Memory: <span id="memory">Unknown</span></p>
        <p>Disk: <span id="disk">Unknown</span></p>
        <p>Uptime: <span id="uptime">Unknown</span></p>
        <p>OS: <span id="os">Unknown</span></p>
        <p>Kernel: <span id="kernel">Unknown</span></p>
    </div>

    <div id="apps-card">
        <h2>Applications</h2>

        <div id="apps-list">
            <p>Loading apps...</p>
        </div>
    </div>

</div>

  <script>
    async function loadSystem() {
    const statusLight = document.getElementById("status-light");
    const statusText = document.getElementById("status-text");

    try {
        const response = await fetch("http://192.168.1.133:8000/system");
        const data = await response.json();

        if (data.health.status === "ok") {
            statusLight.className = "status-light status-live";
            statusText.textContent = "LIVE";
        } else {
            statusLight.className = "status-light status-down";
            statusText.textContent = "DOWN";
        }

        document.getElementById("hostname").textContent = data.hostname;
        document.getElementById("status").textContent = data.health.status;
        document.getElementById("memory").textContent =
            data.memory.used + " / " + data.memory.total;
        document.getElementById("disk").textContent =
            data.disk.used + " / " + data.disk.size + " (" + data.disk.use_percent + ")";
        document.getElementById("uptime").textContent = data.uptime;
        document.getElementById("os").textContent = data.os;
        document.getElementById("kernel").textContent = data.kernel;
        
        const appsList = document.getElementById("apps-list");
        appsList.innerHTML = "";

        data.apps.forEach(app => {
            const row = document.createElement("div");
            row.className = "app-row";

            const left = document.createElement("span");
            const dot = document.createElement("span");

            const right = document.createElement("span");

            if (app.status.includes("Exited")) {
                right.textContent = "STOPPED";
                dot.className = "app-dot app-stopped";
            } else if (app.status.includes("healthy")) {
                right.textContent = "HEALTHY";
                dot.className = "app-dot app-healthy";
            } else {
                right.textContent = "RUNNING";
                dot.className = "app-dot app-running";
            }

            left.appendChild(dot);
            left.appendChild(document.createTextNode(app.name));

            row.appendChild(left);
            row.appendChild(right);
            appsList.appendChild(row);
        });

    } catch (error) {
        statusLight.className = "status-light status-down";
        statusText.textContent = "DOWN";

        document.getElementById("hostname").textContent = "Unavailable";
        document.getElementById("status").textContent = "Down";
        document.getElementById("memory").textContent = "Unknown";
        document.getElementById("disk").textContent = "Unknown";
        document.getElementById("uptime").textContent = "Unknown";
        document.getElementById("os").textContent = "Unknown";
        document.getElementById("kernel").textContent = "Unknown";
        document.getElementById("apps-list").innerHTML = "<p>Unavailable</p>";
    }
}
    loadSystem();

    setInterval(loadSystem, 30000);
  </script>
</body>
